name: Supabase Keepalive

on:
  schedule:
    - cron: "17 15 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Sign in and query Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_EMAIL: ${{ secrets.SUPABASE_KEEPALIVE_EMAIL }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_KEEPALIVE_PASSWORD }}
        run: |
          set -euo pipefail

          AUTH_RESPONSE=$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Content-Type: application/json" \
            --data "{\"email\":\"$SUPABASE_EMAIL\",\"password\":\"$SUPABASE_PASSWORD\"}" \
            "$SUPABASE_URL/auth/v1/token?grant_type=password")

          ACCESS_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Supabase login did not return an access token."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            "$SUPABASE_URL/rest/v1/teams?select=id&limit=1"

          echo
          echo "Supabase keepalive succeeded."
